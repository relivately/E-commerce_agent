<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商智能客服</title>
    <!-- 引入 Markdown 解析库（自动解析表格、列表、加粗等） -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fafafa;
        }

        .chat-box {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
            border: none;
        }

        .header {
            background: linear-gradient(90deg, #ff4400, #ff6633);
            color: white;
            padding: 22px 24px;
            text-align: center;
            font-size: 20px;
            font-weight: 500;
        }

        .messages {
            flex: 1;
            padding: 40px 80px;
            overflow-y: auto;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 16px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 6px;
        }

        .message {
            max-width: 65%;
            line-height: 1.6;
            animation: fadeIn 0.2s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(90deg, #ff4400, #ff5a21);
            color: white;
            padding: 16px 20px;
            border-radius: 18px 18px 6px 18px;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bot {
            align-self: flex-start;
            background: white;
            color: #333;
            padding: 16px 20px;
            border-radius: 18px 18px 18px 6px;
            border: 1px solid #eee;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 关键：客服消息内表格样式 */
        .bot table {
            border-collapse: collapse;
            margin: 12px 0;
            width: 100%;
        }
        .bot th, .bot td {
            border: 1px solid #e5e5e5;
            padding: 8px 12px;
            text-align: left;
        }
        .bot th {
            background-color: #f6f6f6;
        }
        .bot p {
            margin: 0 0 8px 0;
        }
        .bot ul, .bot ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .input-area {
            display: flex;
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #f0f0f0;
            gap: 16px;
        }

        input {
            flex: 1;
            padding: 18px 24px;
            border: 1px solid #eee;
            border-radius: 40px;
            outline: none;
            font-size: 16px;
            background: #f9f9f9;
            transition: all 0.2s;
        }

        input:focus {
            background: white;
            border-color: #ff4400;
            box-shadow: 0 0 0 4px rgba(255, 68, 0, 0.08);
        }

        button {
            padding: 18px 32px;
            background: linear-gradient(90deg, #ff4400, #ff5a21);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 68, 0, 0.2);
        }

    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">淘宝电商智能客服</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="请输入问题...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let thread_id = crypto.randomUUID();
        console.log("当前新对话 ID：", thread_id);

        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            const messages = document.getElementById('messages');

            // 用户消息
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = text;
            messages.appendChild(userDiv);

            chatHistory.push({
                "role": "user",
                "content": text
            });

            input.value = '';

            // AI 加载中
            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            botDiv.innerText = '思考中...';
            messages.appendChild(botDiv);
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('http://127.0.0.1:8000/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: chatHistory,
                        thread_id: thread_id
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const jsonData = JSON.parse(line.replace('data: ', ''));
                                fullAnswer = jsonData.text;
                                
                                // 核心修复：使用 marked 解析 Markdown + 渲染 HTML
                                botDiv.innerHTML = marked.parse(fullAnswer);
                                messages.scrollTop = messages.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }

                chatHistory.push({
                    "role": "assistant",
                    "content": fullAnswer
                });

            } catch (error) {
                botDiv.innerText = '服务异常，请稍后再试';
                console.error(error);
            }
        }

        // 回车发送
        document.getElementById('input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
